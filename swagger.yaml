openapi: 3.0.3

info:
  title: Complex Nested Resource API
  version: 1.0.0
  description: |
    Example enterprise API demonstrating:
      - GET, POST, PUT, and DELETE operations
      - Multiple interpolated path parameters
      - Query and header parameters
      - Deeply nested JSON request and response bodies
      - Reusable component schemas
      - Standardized validation and error responses

servers:
  - url: https://api.example.com
    description: Production
  - url: https://sandbox-api.example.com
    description: Sandbox

tags:
  - name: Nested Resources
    description: Manage resources nested under a project and environment.

paths:
  /api/projects/{param1}/nest/{param2}/resources:
    parameters:
      - $ref: '#/components/parameters/Param1'
      - $ref: '#/components/parameters/Param2'
      - $ref: '#/components/parameters/CorrelationId'

    get:
      tags:
        - Nested Resources
      summary: List nested resources
      operationId: listNestedResources
      description: |
        Returns resources belonging to the project identified by `param1`
        and the nested environment or container identified by `param2`.
      parameters:
        - name: status
          in: query
          required: false
          description: Filter resources by status.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ResourceStatus'
          style: form
          explode: true

        - name: ownerId
          in: query
          required: false
          description: Filter by owner identifier.
          schema:
            type: string
            format: uuid

        - name: tags
          in: query
          required: false
          description: Filter by one or more tags.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
          example:
            - finance
            - approved

        - name: createdAfter
          in: query
          required: false
          description: Return resources created after this timestamp.
          schema:
            type: string
            format: date-time

        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1

        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 25

        - name: sort
          in: query
          required: false
          description: Sort expression using `field,direction`.
          schema:
            type: string
            example: createdAt,desc

        - name: X-Tenant-Id
          in: header
          required: true
          description: Tenant identifier.
          schema:
            type: string
            format: uuid

      responses:
        '200':
          description: Resources retrieved successfully.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResourceResponse'
              examples:
                success:
                  value:
                    data:
                      - id: 0bbf5188-5ac4-4d6d-8289-e76625f21675
                        name: Invoice Processing Workflow
                        status: active
                        version: 3
                        owner:
                          id: c10143a1-9b85-4091-a9e7-4b6ada934ff8
                          displayName: Platform Engineering
                          email: platform@example.com
                          organization:
                            id: org-001
                            name: Example Corporation
                            departments:
                              - id: dept-finance
                                name: Finance
                        configuration:
                          execution:
                            timeoutMs: 30000
                            retry:
                              enabled: true
                              maxAttempts: 3
                              backoff:
                                strategy: exponential
                                initialDelayMs: 500
                                maxDelayMs: 10000
                          security:
                            authenticationType: oauth2
                            scopes:
                              - resource.read
                              - resource.write
                            secrets:
                              clientIdReference: vault://apps/invoice/client-id
                              clientSecretReference: vault://apps/invoice/client-secret
                          mappings:
                            inputs:
                              - source: request.body.invoiceNumber
                                target: workflow.input.invoice.id
                                required: true
                                transformations:
                                  - type: trim
                                  - type: uppercase
                            outputs:
                              - source: workflow.result
                                target: response.body.data
                                required: true
                                transformations: []
                        metadata:
                          tags:
                            - finance
                            - workflow
                          labels:
                            businessUnit: accounts-payable
                            criticality: high
                          annotations:
                            createdBySource: endpoint-designer
                        createdAt: '2026-07-10T14:30:00Z'
                        updatedAt: '2026-07-10T15:10:00Z'
                    pagination:
                      page: 1
                      pageSize: 25
                      totalItems: 1
                      totalPages: 1
                      hasNext: false
                      hasPrevious: false
                    links:
                      self: /api/projects/prj-100/nest/dev/resources?page=1&pageSize=25
                      next: null
                      previous: null

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Nested Resources
      summary: Create a nested resource
      operationId: createNestedResource
      description: Creates a complex resource within the selected project and nested container.
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid

        - name: validateOnly
          in: query
          required: false
          description: Validate the payload without persisting it.
          schema:
            type: boolean
            default: false

        - name: notify
          in: query
          required: false
          description: Send resource-created notifications.
          schema:
            type: boolean
            default: true

      requestBody:
        required: true
        description: Complex nested resource definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
            examples:
              workflow:
                value:
                  name: Invoice Processing Workflow
                  description: Processes supplier invoices and routes approvals.
                  status: draft
                  owner:
                    id: c10143a1-9b85-4091-a9e7-4b6ada934ff8
                    displayName: Platform Engineering
                    email: platform@example.com
                    organization:
                      id: org-001
                      name: Example Corporation
                      departments:
                        - id: dept-finance
                          name: Finance
                        - id: dept-procurement
                          name: Procurement
                  configuration:
                    execution:
                      timeoutMs: 30000
                      concurrencyLimit: 10
                      retry:
                        enabled: true
                        maxAttempts: 3
                        retryOnStatusCodes:
                          - 408
                          - 429
                          - 500
                          - 502
                          - 503
                        backoff:
                          strategy: exponential
                          initialDelayMs: 500
                          multiplier: 2
                          maxDelayMs: 10000
                    security:
                      authenticationType: oauth2
                      scopes:
                        - resource.read
                        - resource.write
                      secrets:
                        clientIdReference: vault://apps/invoice/client-id
                        clientSecretReference: vault://apps/invoice/client-secret
                      certificate:
                        enabled: true
                        certificateReference: vault://certificates/invoice-api
                        validateServerCertificate: true
                    mappings:
                      inputs:
                        - source: request.body.invoiceNumber
                          target: workflow.input.invoice.id
                          required: true
                          defaultValue: null
                          transformations:
                            - type: trim
                              options: {}
                            - type: uppercase
                              options: {}
                        - source: request.headers.x-business-unit
                          target: workflow.context.businessUnit
                          required: false
                          defaultValue: finance
                          transformations: []
                      outputs:
                        - source: workflow.result.invoice
                          target: response.body.data.invoice
                          required: true
                          transformations:
                            - type: jsonPath
                              options:
                                expression: $.approvedInvoice
                    notifications:
                      enabled: true
                      channels:
                        - type: email
                          recipients:
                            - finance-ops@example.com
                            - audit@example.com
                          template:
                            id: invoice-created
                            variables:
                              priority: high
                              locale: en-US
                        - type: webhook
                          endpoint: https://hooks.example.com/resource-events
                          headers:
                            X-Webhook-Source: nested-resource-api
                          events:
                            - resource.created
                            - resource.failed
                  metadata:
                    tags:
                      - finance
                      - workflow
                      - invoice
                    labels:
                      businessUnit: accounts-payable
                      criticality: high
                    annotations:
                      createdBySource: endpoint-designer
                      documentationUrl: https://docs.example.com/workflows/invoice

      responses:
        '201':
          description: Resource created successfully.
          headers:
            Location:
              description: URL of the newly created resource.
              schema:
                type: string
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'

        '202':
          description: Validation or asynchronous creation accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAcceptedResponse'

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/projects/{param1}/nest/{param2}/resources/{resourceId}:
    parameters:
      - $ref: '#/components/parameters/Param1'
      - $ref: '#/components/parameters/Param2'
      - $ref: '#/components/parameters/ResourceId'
      - $ref: '#/components/parameters/CorrelationId'

    get:
      tags:
        - Nested Resources
      summary: Get a nested resource by ID
      operationId: getNestedResource
      parameters:
        - name: include
          in: query
          required: false
          description: Optional related sections to include.
          schema:
            type: array
            items:
              type: string
              enum:
                - audit
                - history
                - permissions
                - dependencies
          style: form
          explode: false

        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid

      responses:
        '200':
          description: Resource retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'

        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Nested Resources
      summary: Replace a nested resource
      operationId: replaceNestedResource
      description: Replaces the complete mutable definition of an existing resource.
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid

        - name: If-Match
          in: header
          required: true
          description: Current resource ETag used for optimistic concurrency.
          schema:
            type: string
            example: '"resource-v3"'

        - name: publish
          in: query
          required: false
          description: Publish the resource after a successful update.
          schema:
            type: boolean
            default: false

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceResourceRequest'

      responses:
        '200':
          description: Resource replaced successfully.
          headers:
            ETag:
              description: New resource version identifier.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          description: The supplied ETag does not match the current resource version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Nested Resources
      summary: Delete a nested resource
      operationId: deleteNestedResource
      description: |
        Deletes or soft-deletes a resource. The operation uses query parameters
        instead of a request body for broad HTTP client compatibility.
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid

        - name: mode
          in: query
          required: false
          description: Determines whether deletion is reversible.
          schema:
            type: string
            enum:
              - soft
              - permanent
            default: soft

        - name: cascade
          in: query
          required: false
          description: Delete dependent child resources.
          schema:
            type: boolean
            default: false

        - name: reason
          in: query
          required: true
          description: Audit reason for deleting the resource.
          schema:
            type: string
            minLength: 5
            maxLength: 500

        - name: If-Match
          in: header
          required: false
          description: Optional ETag for optimistic concurrency.
          schema:
            type: string

      responses:
        '204':
          description: Resource deleted successfully.

        '202':
          description: Asynchronous deletion accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAcceptedResponse'

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    Param1:
      name: param1
      in: path
      required: true
      description: Project identifier interpolated into the URL.
      schema:
        type: string
        minLength: 1
        example: prj-100

    Param2:
      name: param2
      in: path
      required: true
      description: Nested environment, namespace, or container identifier.
      schema:
        type: string
        minLength: 1
        example: development

    ResourceId:
      name: resourceId
      in: path
      required: true
      description: Unique resource identifier.
      schema:
        type: string
        format: uuid

    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Correlation identifier used for distributed tracing.
      schema:
        type: string
        format: uuid

  headers:
    CorrelationId:
      description: Correlation identifier used for distributed tracing.
      schema:
        type: string
        format: uuid

  schemas:
    ResourceStatus:
      type: string
      enum:
        - draft
        - active
        - suspended
        - archived

    CreateResourceRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - status
        - owner
        - configuration
        - metadata
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 150
        description:
          type: string
          maxLength: 2000
        status:
          $ref: '#/components/schemas/ResourceStatus'
        owner:
          $ref: '#/components/schemas/Owner'
        configuration:
          $ref: '#/components/schemas/ResourceConfiguration'
        metadata:
          $ref: '#/components/schemas/ResourceMetadata'

    ReplaceResourceRequest:
      allOf:
        - $ref: '#/components/schemas/CreateResourceRequest'
        - type: object
          required:
            - changeSummary
          properties:
            changeSummary:
              type: object
              additionalProperties: false
              required:
                - reason
                - requestedBy
              properties:
                reason:
                  type: string
                  minLength: 5
                  maxLength: 500
                requestedBy:
                  type: string
                  format: email
                ticket:
                  type: object
                  additionalProperties: false
                  properties:
                    system:
                      type: string
                      example: JIRA
                    key:
                      type: string
                      example: PLATFORM-2048
                    url:
                      type: string
                      format: uri

    Resource:
      allOf:
        - $ref: '#/components/schemas/CreateResourceRequest'
        - type: object
          required:
            - id
            - version
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            version:
              type: integer
              minimum: 1
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    Owner:
      type: object
      additionalProperties: false
      required:
        - id
        - displayName
        - email
        - organization
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: object
          additionalProperties: false
          properties:
            countryCode:
              type: string
              example: '+20'
            number:
              type: string
              example: '1001234567'
            extension:
              type: string
              nullable: true
        organization:
          $ref: '#/components/schemas/Organization'

    Organization:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - departments
      properties:
        id:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        departments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Department'

    Address:
      type: object
      additionalProperties: false
      required:
        - line1
        - city
        - country
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
          nullable: true
        postalCode:
          type: string
        country:
          type: object
          additionalProperties: false
          required:
            - code
            - name
          properties:
            code:
              type: string
              minLength: 2
              maxLength: 2
              example: EG
            name:
              type: string
              example: Egypt
            region:
              type: object
              additionalProperties: false
              properties:
                code:
                  type: string
                  example: MEA
                name:
                  type: string
                  example: Middle East and Africa

    Department:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        costCenter:
          type: object
          additionalProperties: false
          properties:
            code:
              type: string
            currency:
              type: string
              minLength: 3
              maxLength: 3
            annualBudget:
              type: number
              format: double
              minimum: 0

    ResourceConfiguration:
      type: object
      additionalProperties: false
      required:
        - execution
        - security
        - mappings
      properties:
        execution:
          $ref: '#/components/schemas/ExecutionConfiguration'
        security:
          $ref: '#/components/schemas/SecurityConfiguration'
        mappings:
          $ref: '#/components/schemas/MappingConfiguration'
        notifications:
          $ref: '#/components/schemas/NotificationConfiguration'

    ExecutionConfiguration:
      type: object
      additionalProperties: false
      required:
        - timeoutMs
        - retry
      properties:
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 300000
        concurrencyLimit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 10
        retry:
          $ref: '#/components/schemas/RetryConfiguration'
        schedule:
          type: object
          additionalProperties: false
          properties:
            enabled:
              type: boolean
              default: false
            cron:
              type: string
              nullable: true
              example: 0 */5 * * * *
            timezone:
              type: string
              example: Africa/Cairo
            activeWindow:
              type: object
              additionalProperties: false
              properties:
                startsAt:
                  type: string
                  format: date-time
                endsAt:
                  type: string
                  format: date-time

    RetryConfiguration:
      type: object
      additionalProperties: false
      required:
        - enabled
        - maxAttempts
        - backoff
      properties:
        enabled:
          type: boolean
        maxAttempts:
          type: integer
          minimum: 1
          maximum: 20
        retryOnStatusCodes:
          type: array
          uniqueItems: true
          items:
            type: integer
            minimum: 100
            maximum: 599
        backoff:
          type: object
          additionalProperties: false
          required:
            - strategy
            - initialDelayMs
            - maxDelayMs
          properties:
            strategy:
              type: string
              enum:
                - fixed
                - linear
                - exponential
            initialDelayMs:
              type: integer
              minimum: 0
            multiplier:
              type: number
              format: double
              minimum: 1
              default: 2
            maxDelayMs:
              type: integer
              minimum: 0

    SecurityConfiguration:
      type: object
      additionalProperties: false
      required:
        - authenticationType
        - scopes
      properties:
        authenticationType:
          type: string
          enum:
            - none
            - apiKey
            - basic
            - oauth2
            - mutualTls
        scopes:
          type: array
          uniqueItems: true
          items:
            type: string
        secrets:
          type: object
          additionalProperties: false
          properties:
            clientIdReference:
              type: string
            clientSecretReference:
              type: string
            apiKeyReference:
              type: string
        certificate:
          type: object
          additionalProperties: false
          properties:
            enabled:
              type: boolean
            certificateReference:
              type: string
              nullable: true
            validateServerCertificate:
              type: boolean
              default: true
        network:
          type: object
          additionalProperties: false
          properties:
            allowedIpRanges:
              type: array
              items:
                type: string
                example: 10.0.0.0/24
            proxy:
              type: object
              additionalProperties: false
              properties:
                enabled:
                  type: boolean
                url:
                  type: string
                  format: uri
                  nullable: true
                credentialsReference:
                  type: string
                  nullable: true

    MappingConfiguration:
      type: object
      additionalProperties: false
      required:
        - inputs
        - outputs
      properties:
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/DataMapping'
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/DataMapping'

    DataMapping:
      type: object
      additionalProperties: false
      required:
        - source
        - target
        - required
        - transformations
      properties:
        source:
          type: string
        target:
          type: string
        required:
          type: boolean
        defaultValue:
          nullable: true
        transformations:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - type
            properties:
              type:
                type: string
                enum:
                  - trim
                  - uppercase
                  - lowercase
                  - jsonPath
                  - template
                  - dateFormat
                  - numberFormat
              options:
                type: object
                additionalProperties: true

    NotificationConfiguration:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          default: false
        channels:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/EmailNotificationChannel'
              - $ref: '#/components/schemas/WebhookNotificationChannel'
            discriminator:
              propertyName: type
              mapping:
                email: '#/components/schemas/EmailNotificationChannel'
                webhook: '#/components/schemas/WebhookNotificationChannel'

    EmailNotificationChannel:
      type: object
      additionalProperties: false
      required:
        - type
        - recipients
        - template
      properties:
        type:
          type: string
          enum:
            - email
        recipients:
          type: array
          minItems: 1
          items:
            type: string
            format: email
        cc:
          type: array
          items:
            type: string
            format: email
        template:
          type: object
          additionalProperties: false
          required:
            - id
          properties:
            id:
              type: string
            variables:
              type: object
              additionalProperties:
                type: string

    WebhookNotificationChannel:
      type: object
      additionalProperties: false
      required:
        - type
        - endpoint
        - events
      properties:
        type:
          type: string
          enum:
            - webhook
        endpoint:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
        events:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
              - resource.created
              - resource.updated
              - resource.deleted
              - resource.failed

    ResourceMetadata:
      type: object
      additionalProperties: false
      required:
        - tags
        - labels
      properties:
        tags:
          type: array
          uniqueItems: true
          items:
            type: string
        labels:
          type: object
          additionalProperties:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string

    ResourceResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - links
      properties:
        data:
          $ref: '#/components/schemas/Resource'
        links:
          type: object
          additionalProperties: false
          required:
            - self
          properties:
            self:
              type: string
            project:
              type: string
            nestedContainer:
              type: string
            audit:
              type: string
              nullable: true

    PagedResourceResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - pagination
        - links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        pagination:
          $ref: '#/components/schemas/Pagination'
        links:
          type: object
          additionalProperties: false
          required:
            - self
          properties:
            self:
              type: string
            next:
              type: string
              nullable: true
            previous:
              type: string
              nullable: true

    Pagination:
      type: object
      additionalProperties: false
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    OperationAcceptedResponse:
      type: object
      additionalProperties: false
      required:
        - operationId
        - status
        - submittedAt
        - links
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - accepted
            - processing
        submittedAt:
          type: string
          format: date-time
        links:
          type: object
          additionalProperties: false
          properties:
            status:
              type: string
            cancel:
              type: string
              nullable: true

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - correlationId
        - timestamp
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: RESOURCE_VALIDATION_FAILED
            message:
              type: string
            target:
              type: string
              nullable: true
            details:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  path:
                    type: string
                    nullable: true
                  rejectedValue:
                    nullable: true
                  metadata:
                    type: object
                    additionalProperties: true
        correlationId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        trace:
          type: object
          additionalProperties: false
          properties:
            traceId:
              type: string
            spanId:
              type: string
            service:
              type: string

  responses:
    BadRequest:
      description: The request is malformed or contains invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Authentication is required or has failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: The caller does not have permission to perform this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: The requested project, nested container, or resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: The operation conflicts with the current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationFailed:
      description: The request body failed semantic validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
